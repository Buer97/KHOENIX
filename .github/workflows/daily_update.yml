name: 每日A股情绪数据更新

on:
  schedule:
    # 北京时间 15:35 = UTC 07:35，周一至周五
    - cron: '35 7 * * 1-5'
  # 允许手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install akshare openpyxl pandas

      - name: 运行更新脚本
        run: python daily_update.py

      - name: 提交更新
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add 情绪周期.xlsx
          if git diff --cached --quiet; then
            echo "没有数据更新，跳过提交"
          else
            git commit -m "📊 自动更新 $(date -u +%Y-%m-%d) 情绪数据"
            git push
          fi
